<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Just a Small Question 😊</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
    }

    .container {
      background: white;
      padding: 60px 40px;
      border-radius: 20px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
      text-align: center;
      max-width: 500px;
      animation: slideIn 0.6s ease-out;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(-30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    h1 {
      color: #333;
      font-size: 2.5em;
      margin-bottom: 20px;
    }

    p {
      color: #666;
      font-size: 1.1em;
      margin: 15px 0;
      line-height: 1.6;
    }

    .button-container {
      display: flex;
      gap: 20px;
      margin-top: 40px;
      justify-content: center;
    }

    .btn {
      padding: 14px 32px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s ease;
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    #yesBtn {
      background-color: #4CAF50;
      color: white;
      flex: 1;
      max-width: 150px;
    }

    #yesBtn:hover {
      background-color: #45a049;
      transform: scale(1.05);
    }

    #noBtn {
      background-color: #f44336;
      color: white;
      flex: 1;
      max-width: 150px;
      position: relative;
    }

    #noBtn:hover {
      background-color: #da190b;
    }

    .success-screen {
      animation: popIn 0.5s ease-out;
    }

    @keyframes popIn {
      0% {
        opacity: 0;
        transform: scale(0.5);
      }
      100% {
        opacity: 1;
        transform: scale(1);
      }
    }

    .confetti {
      position: fixed;
      pointer-events: none;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Hey 😊</h1>
    <p>I enjoy talking to you…</p>
    <p>Would you be up for a short call sometime? ☎️</p>

    <div class="button-container">
      <button id="yesBtn" class="btn" onclick="yesClicked()">Yes 😊</button>
      <button id="noBtn" class="btn">No 😅</button>
    </div>
  </div>

  <script>
    const noBtn = document.getElementById("noBtn");
    const container = document.querySelector(".container");

    noBtn.addEventListener("mouseover", () => {
      const x = Math.random() * (window.innerWidth - 150);
      const y = Math.random() * (window.innerHeight - 60);
      noBtn.style.position = "fixed";
      noBtn.style.left = x + "px";
      noBtn.style.top = y + "px";
    });

    function yesClicked() {
      container.innerHTML = `
        <h1>That made my day 😊</h1>
        <p>We'll plan it soon!</p>
        <p style="margin-top: 30px; font-size: 3em;">🎉📞✨</p>
      `;
      container.classList.add("success-screen");
      createConfetti();
    }

    function createConfetti() {
      const colors = ["#ff6b6b", "#4ecdc4", "#45b7d1", "#f9ca24", "#6c5ce7"];
      for (let i = 0; i < 30; i++) {
        const confetti = document.createElement("div");
        confetti.className = "confetti";
        confetti.style.left = Math.random() * window.innerWidth + "px";
        confetti.style.top = "-10px";
        confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
        confetti.style.width = Math.random() * 10 + 5 + "px";
        confetti.style.height = confetti.style.width;
        confetti.style.borderRadius = "50%";
        document.body.appendChild(confetti);

        const duration = Math.random() * 3 + 2;
        confetti.animate([
          { transform: "translateY(0) rotate(0deg)", opacity: 1 },
          { transform: `translateY(${window.innerHeight}px) rotate(360deg)`, opacity: 0 }
        ], { duration: duration * 1000 });

        setTimeout(() => confetti.remove(), duration * 1000);
      }
    }
  </script>

</body>
</html>
